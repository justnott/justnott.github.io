<div class="loading">
  <div class="spinner"></div>
  <div class="text">Hang tight</div>
  <div class="number">1</div>
</div>

<style>
.loading {
  position: fixed;
  bottom: 0;
  left: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
}

.spinner {
  border: 3px solid rgba(0, 0, 0, 0.1);
  border-top-color: #3498db;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: spin 1s ease-in-out infinite;
}

.text {
  margin-left: 10px;
  font-size: 24px;
  font-weight: bold;
}

.number {
  position: absolute;
  bottom: 10px;
  left: 10px;
  font-size: 18px;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}
</style>

<script>
  setTimeout(function() {
    var loading = document.querySelector('.loading');
    loading.style.display = 'none';
  }, 5000); // Replace 5000 with the number of milliseconds you want to wait before hiding the loading animation
</script>
