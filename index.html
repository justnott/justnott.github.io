<!DOCTYPE html>
<html>
  <head>
    <title>Loading Screen</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #ffffff;
        color: #333333;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #333333;
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-right: 10px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-color-scheme: dark) {
        body {
          background-color: #333333;
          color: #ffffff;
        }
      }

      .dark-mode-switch {
        position: absolute;
        top: 10px;
        right: 10px;
      }

      .dark-mode-switch label {
        position: relative;
        display: inline-block;
        width: 60px;
        height: 34px;
      }

      .dark-mode-switch label input {
        display: none;
      }

      .dark-mode-switch label span {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        border-radius: 34px;
        transition: 0.4s;
      }

      .dark-mode-switch label span:before {
        content: "";
        position: absolute;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background-color: #fff;
        top: 4px;
        left: 4px;
        transition: 0.4s;
      }

      .dark-mode-switch input:checked + span {
        background-color: #2196F3;
      }

      .dark-mode-switch input:checked + span:before {
        transform: translateX(26px);
      }

      .message {
        display: none;
        text-align: center;
        font-size: 24px;
      }

      .show-message .message {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="dark-mode-switch">
      <label>
        <input type="checkbox">
        <span></span>
      </label>
    </div>
    <div class="loading">
      <div class="spinner"></div>
      <div>Loading...</div>
    </div>
    <div class="show-message">
      <div class="message">Welcome to our website!</div>
    </div>
    <script>
      function showMessage() {
        const messageElement = document.querySelector('.show-message');
        messageElement.classList.add('show-message');
      }

      const randomTimeout = Math.floor(Math.random() * 5000) + 1000;
      setTimeout(showMessage, randomTimeout);
    </script>
  </body>
</html>
