<!DOCTYPE html>
<html>
  <head>
    <title>Loading Screen Example</title>
    <style>
      #loading-screen {
        background-color: #f5f5f5;
        height: 100%;
        left: 0;
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
      }

      #loading-circle {
        animation: spin 2s linear infinite;
        border: 4px solid #666;
        border-top-color: #999;
        border-radius: 50%;
        height: 50px;
        left: 50%;
        margin-left: -25px;
        margin-top: -25px;
        position: absolute;
        top: 50%;
        width: 50px;
      }

      #loading-message {
        color: #666;
        font-size: 24px;
        left: 50%;
        margin-left: -60px;
        margin-top: 40px;
        position: absolute;
        text-align: center;
        width: 120px;
      }

      .hidden {
        display: none;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div id="loading-circle"></div>
      <div id="loading-message">Loading...</div>
    </div>

    <div id="content" class="hidden">
      <h1>Welcome to My Website!</h1>
      <p>This is some content for my website.</p>
    </div>

    <script>
      function hideLoadingScreen() {
        // get the loading screen and content elements
        const loadingScreen = document.getElementById("loading-screen");
        const content = document.getElementById("content");

        // hide the loading screen
        loadingScreen.classList.add("hidden");

        // show the content
        content.classList.remove("hidden");
      }

      // wait a random amount of time (between 2 and 5 seconds)
      const randomTime = Math.floor(Math.random() * (5000 - 2000 + 1)) + 2000;
      setTimeout(hideLoadingScreen, randomTime);
    </script>
  </body>
</html>
